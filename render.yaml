services:
  - type: web
    name: desktop-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: consumption-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.12"
      - key: RENDER_BACKEND_URL
        value: "https://desktop-backend-vhf0.onrender.com"
      - key: RENDER_MCP_URL
        value: "https://desktop-backend-vhf0.onrender.com"

databases:
  - name: consumption-db
    plan: free
    databaseName: consumption
