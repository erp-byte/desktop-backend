services:
  - type: web
    name: consumption-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: consumption-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.12"

  - type: web
    name: consumption-mcp
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python mcp_server.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: consumption-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.12"

databases:
  - name: consumption-db
    plan: free
    databaseName: consumption
